name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: lytecache-go

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # "stable" and "oldstable" track the two most recent Go releases
        # automatically, so this matrix never needs bumping by hand.
        go-version: ["stable", "oldstable"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        if: matrix.go-version == 'stable' && matrix.os == 'ubuntu-latest'
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: golangci-lint
        if: matrix.go-version == 'stable' && matrix.os == 'ubuntu-latest'
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: lytecache-go
          # golangci-lint-action@v6 predates golangci-lint v2 and only ever resolves
          # `version: latest` to the latest v1.x release -- which was built with an
          # older Go toolchain than this module's `go 1.25.0` directive, so it refused
          # to run at all ("the Go language version used to build golangci-lint is
          # lower than the targeted Go version"). .golangci.yml already targets the v2
          # config schema, so v9 + an explicit v2.x version (per golangci-lint-action's
          # own docs) is what actually matches the intended tool version.
          version: v2.12

      - name: go test -race
        run: go test -race -v ./...
