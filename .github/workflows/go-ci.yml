name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: lytecache-go

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # "stable" and "oldstable" track the two most recent Go releases
        # automatically, so this matrix never needs bumping by hand.
        go-version: ["stable", "oldstable"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        if: matrix.go-version == 'stable' && matrix.os == 'ubuntu-latest'
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: golangci-lint
        if: matrix.go-version == 'stable' && matrix.os == 'ubuntu-latest'
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: lytecache-go
          version: latest

      - name: go test -race
        run: go test -race -v ./...
