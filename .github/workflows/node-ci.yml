name: Node CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: lytecache-node

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # better-sqlite3 is a native module, so the OS matrix matters here -- it's not just a
        # question of Node version compatibility, but of prebuilt binary availability per platform.
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ["18", "20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify npm pack contents
        if: matrix.node-version == '20' && matrix.os == 'ubuntu-latest'
        run: |
          npm pack --dry-run
          npm pack
          tar -tzf lytecache-*.tgz
