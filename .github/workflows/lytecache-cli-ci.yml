name: lytecache-cli CI

# Mirrors go-ci.yml's matrix, but for the separate lytecache-cli module (see
# lytecache-cli/go.mod's `replace` directive -- this checkout is exactly the
# one place that local replace resolves, since lytecache-go/ is right here
# as a sibling directory).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: lytecache-cli

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: ["stable", "oldstable"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        if: matrix.go-version == 'stable' && matrix.os == 'ubuntu-latest'
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: golangci-lint
        if: matrix.go-version == 'stable' && matrix.os == 'ubuntu-latest'
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: lytecache-cli
          version: v2.12

      - name: go test -race
        run: go test -race -v ./...

      - name: goreleaser check
        if: matrix.go-version == 'stable' && matrix.os == 'ubuntu-latest'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: check
          workdir: lytecache-cli
