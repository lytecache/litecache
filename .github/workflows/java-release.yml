name: Release Java to Maven Central

on:
  push:
    tags:
      # Distinct prefix from the Python release tags (python-v*) so tagging one
      # package's release can never accidentally trigger the other's workflow.
      - "java-v*"

defaults:
  run:
    working-directory: lytecache-java

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build
        run: ./gradlew clean build --no-daemon

      - name: Publish to Maven Local (verify)
        run: ./gradlew publishToMavenLocal --no-daemon

      - name: Publish signed release to Sonatype Central
        env:
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.SONATYPE_PASSWORD }}
        # publishMavenJavaPublicationToSonatypeCentralRepository (plain maven-publish) only
        # uploads artifacts into a new staging repository -- it never calls Sonatype's required
        # follow-up close/release API, so the upload would succeed while the deployment stayed
        # invisible forever on both the Sonatype Deployments page and Maven Central itself. The
        # gradle-nexus/publish-plugin task chain below drives that whole lifecycle instead.
        run: ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository --no-daemon

      - name: Determine release version
        # github.ref_name is the full tag ("java-v0.2.0"), not the bare artifact version
        # ("0.2.0") that actually appears in Gradle's output filenames and Maven coordinates.
        id: version
        run: echo "version=${GITHUB_REF_NAME#java-v}" >> "$GITHUB_OUTPUT"

      - name: Create release notes
        run: |
          cat > release-notes.md << 'EOF'
          # LyteCache Java ${{ github.ref_name }}

          See lytecache-java/README.md for usage and lytecache-java/SPEC.md for the storage format.

          ## Installation

          ```gradle
          implementation 'io.github.lytecache:lytecache:${{ steps.version.outputs.version }}'
          ```

          ## Artifacts

          - lytecache-${{ steps.version.outputs.version }}.jar
          - lytecache-${{ steps.version.outputs.version }}-sources.jar
          - lytecache-${{ steps.version.outputs.version }}-javadoc.jar
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          body_path: lytecache-java/release-notes.md
          files: |
            lytecache-java/build/libs/lytecache-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
